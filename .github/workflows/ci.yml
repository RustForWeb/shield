name: CI

on:
    pull_request: {}
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    rust:
        name: Rust
        uses: RustForWeb/.github/.github/workflows/rust.yml@dc2442c27ef9f920a1a889ec94e615b419b491b2 # v1.0.1
        with:
            enable-test: false
            target: wasm32-unknown-unknown

    test:
        name: Test
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql
                ports:
                    - 13306:3306
                env:
                    MYSQL_ROOT_PASSWORD: shield
                    MYSQL_USER: shield
                    MYSQL_PASSWORD: shield
                    MYSQL_DATABASE: shield

            postgresql:
                image: postgres
                ports:
                    - 15432:5432
                env:
                    POSTGRES_USER: shield
                    POSTGRES_PASSWORD: shield
                    POSTGRES_DB: shield

        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
              with:
                  target: wasm32-unknown-unknown
                  components: rust-src

            - name: Test
              run: cargo test --locked --release
